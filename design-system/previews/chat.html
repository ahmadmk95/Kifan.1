<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Chat — Kifan Design System</title>
<link rel="stylesheet" href="../assets/app.css">
<style>body{padding:0}</style>
</head>
<body>

  <div class="chat-wrap" style="height:auto;padding:16px">
    <div class="chat-msgs" style="flex:none">
      <div class="chat-msg">
        <div class="chat-av" style="background:linear-gradient(150deg,#2F6B45,#3F7A52)">ز</div>
        <div class="chat-bubble">
          <div class="chat-name">زهراء علي</div>
          <div class="chat-text">وصلت الحبال، بس محتاجين لافتة إضافية عند الباب الجانبي</div>
          <div class="chat-time ar-num">٧:١٠ م</div>
        </div>
      </div>
      <div class="chat-msg chat-me">
        <div class="chat-bubble">
          <div class="chat-text">تمام، راح أجهزها الحين</div>
          <div class="chat-time ar-num">٧:١٢ م</div>
        </div>
      </div>
      <div class="chat-msg">
        <div class="chat-av" style="background:linear-gradient(150deg,#574073,#6B4E86)">م</div>
        <div class="chat-bubble">
          <div class="chat-name">مريم كاظم</div>
          <div class="chat-text">جزاكِ الله خيراً 🤍</div>
          <div class="chat-time ar-num">٧:١٣ م</div>
        </div>
      </div>
    </div>
    <div class="chat-form">
      <input placeholder="اكتبي رسالة...">
      <button class="chat-send"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
  </div>

  <div class="chat-admin-wrap" style="margin:0;min-height:280px">
    <div class="chat-comm-list">
      <button class="chat-comm-btn active">الاستقبال</button>
      <button class="chat-comm-btn">الضيافة</button>
      <button class="chat-comm-btn">المجلس</button>
      <button class="chat-comm-btn">التنظيم</button>
    </div>
    <div class="chat-admin-panel">
      <div class="chat-empty">لا رسائل بعد — ابدئي المحادثة 🤍</div>
    </div>
  </div>

</body>
</html>
