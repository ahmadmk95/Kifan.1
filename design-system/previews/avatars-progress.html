<!-- @dsCard group="Components" -->
<!-- @dsName الصورة الرمزية وحلقة التقدم -->
<!-- @dsSubtitle Avatar sizes across the committee palette, progress ring -->
<!-- @dsViewport width=420 height=420 -->
<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Avatars &amp; Progress — Kifan Design System</title>
<link rel="stylesheet" href="../assets/app.css">
<style>
  body{padding:24px}
  .ds-h{font-family:var(--font-d);font-size:14px;font-weight:700;color:var(--maroon-2);margin:24px 0 12px}
  .ds-h:first-child{margin-top:0}
  .ds-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
</style>
</head>
<body>

  <div class="ds-h">أحجام الصورة الرمزية</div>
  <div class="ds-row">
    <div class="avatar" style="width:30px;height:30px;font-size:13px;background:linear-gradient(150deg,#6E1322,#9E1B32)">ف</div>
    <div class="avatar" style="width:42px;height:42px;font-size:18px;background:linear-gradient(150deg,#2F6B45,#3F7A52)">ز</div>
    <div class="avatar" style="width:46px;height:46px;font-size:19px;background:linear-gradient(150deg,#574073,#6B4E86)">م</div>
  </div>

  <div class="ds-h">لوحة ألوان اللجان</div>
  <div class="ds-row">
    <div class="avatar" style="width:42px;height:42px;font-size:18px;background:linear-gradient(150deg,#6E1322,#9E1B32)">ب</div>
    <div class="avatar" style="width:42px;height:42px;font-size:18px;background:linear-gradient(150deg,#9C7E2E,#BE9A3E)">ر</div>
    <div class="avatar" style="width:42px;height:42px;font-size:18px;background:linear-gradient(150deg,#3C5366,#4A6072)">س</div>
    <div class="avatar" style="width:42px;height:42px;font-size:18px;background:linear-gradient(150deg,#8A4A1B,#B5651D)">ز</div>
    <div class="avatar" style="width:42px;height:42px;font-size:18px;background:linear-gradient(150deg,#235454,#2F6B6B)">ن</div>
  </div>

  <div class="ds-h">حلقة التقدم (Progress Ring)</div>
  <div class="ds-row">
    <div class="ring" style="width:84px;height:84px">
      <svg width="84" height="84">
        <circle cx="42" cy="42" r="37.5" fill="none" stroke="var(--cream-2)" stroke-width="9"/>
        <circle cx="42" cy="42" r="37.5" fill="none" stroke="url(#gg1)" stroke-width="9" stroke-dasharray="235.6" stroke-dashoffset="65" stroke-linecap="round" transform="rotate(-90 42 42)"/>
        <defs><linearGradient id="gg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#BE9A3E"/><stop offset="1" stop-color="#9E1B32"/></linearGradient></defs>
      </svg>
      <div class="pct"><span class="ar-num">٧٢٪</span></div>
    </div>
    <div class="ring" style="width:60px;height:60px">
      <svg width="60" height="60">
        <circle cx="30" cy="30" r="25.5" fill="none" stroke="var(--cream-2)" stroke-width="7"/>
        <circle cx="30" cy="30" r="25.5" fill="none" stroke="url(#gg2)" stroke-width="7" stroke-dasharray="160.2" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 30 30)"/>
        <defs><linearGradient id="gg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#BE9A3E"/><stop offset="1" stop-color="#9E1B32"/></linearGradient></defs>
      </svg>
      <div class="pct"><span class="ar-num" style="font-size:14px">١٠٠٪</span></div>
    </div>
  </div>

</body>
</html>
