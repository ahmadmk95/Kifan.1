<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Modal — Kifan Design System</title>
<link rel="stylesheet" href="../assets/app.css">
<style>body{padding:24px;background:var(--cream)}</style>
</head>
<body>

  <div class="overlay" style="position:static;padding:0;backdrop-filter:none;background:transparent;animation:none">
    <div class="modal" style="animation:none">
      <div class="modal-head">
        <h3>تعديل المهمة</h3>
        <button class="x">×</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>عنوان المهمة</label>
          <input value="تنظيم طابور الدخول" readonly>
        </div>
        <div class="field-row">
          <div class="field">
            <label>اللجنة</label>
            <select><option>التنظيم</option></select>
          </div>
          <div class="field">
            <label>الخادمة (اختياري)</label>
            <select><option>رقية حسن</option></select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>الوقت</label>
            <input value="٨:٠٠ م" readonly>
          </div>
          <div class="field">
            <label>المكان</label>
            <input value="المدخل الرئيسي" readonly>
          </div>
        </div>
        <div class="field">
          <label>ملاحظة (اختياري)</label>
          <input placeholder="تفاصيل إضافية…">
        </div>
        <div class="modal-foot">
          <button class="btn-primary">حفظ التعديلات</button>
          <button class="btn-ghost">إلغاء</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
