<!-- @dsName التكريم والتقييمات -->
<!-- @dsSubtitle Spotlight banner, rating cards, seen/unseen tags -->
<!-- @dsViewport width=480 height=520 -->
<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Spotlight &amp; Ratings — Kifan Design System</title>
<link rel="stylesheet" href="../assets/app.css">
<style>
  body{padding:24px}
  .ds-h{font-family:var(--font-d);font-size:14px;font-weight:700;color:var(--maroon-2);margin:24px 0 10px}
  .ds-h:first-child{margin-top:0}
</style>
</head>
<body>

  <div class="ds-h">بانر التكريم اليومي</div>
  <div class="spotlight-banner">
    <span class="sp-ic">🌟</span>
    <div class="sp-body">
      <div class="sp-title">خادمة اليوم: <strong>سارة محمد</strong></div>
      <div class="sp-note">ما قصّرت اليوم بتنظيم قاعة المجلس 🤍</div>
    </div>
    <button class="sp-cheer">🤍 شدّي على يدها <span class="ar-num">١٢</span></button>
  </div>

  <div class="ds-h">بطاقة تقييم — بها تعليق، لم تُرَ بعد</div>
  <div class="ratings-list">
    <div class="rating-card rating-new">
      <div class="new-tag">جديد ✨</div>
      <div class="rc-top">
        <span class="rc-stars">★★★★★</span>
        <span class="rc-author" style="font-weight:700;color:var(--maroon-2)">زهراء علي</span>
        <span class="seen-tag seen-no">لم تره بعد</span>
      </div>
      <div class="rc-comment">جزاكِ الله خيراً على تعاونكِ الدائم مع الجميع</div>
      <div class="rc-time ar-num">اليوم ٦:٤٠ م</div>
    </div>

    <div class="rating-card">
      <div class="rc-top">
        <span class="rc-stars">★★★★☆</span>
        <span class="rc-author" style="font-weight:700;color:var(--maroon-2)">مريم كاظم</span>
        <span class="seen-tag seen-yes">رأته ✓</span>
      </div>
      <div class="rc-comment">دقيقة بالمواعيد دائماً</div>
      <div class="rc-time ar-num">أمس ٧:١٥ م</div>
    </div>
  </div>

</body>
</html>
