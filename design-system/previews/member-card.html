<!-- @dsSubtitle Member progress card with bar and stats -->

<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Member Card — Kifan Design System</title>
<link rel="stylesheet" href="../assets/app.css">
<style>body{padding:24px}</style>
</head>
<body>

  <div class="members-grid">
    <div class="mcard">
      <div class="mcard-top">
        <div class="avatar av" style="width:46px;height:46px;font-size:19px;background:linear-gradient(150deg,#2F6B45,#3F7A52)">ز</div>
        <div>
          <div class="nm">زهراء علي</div>
          <div class="tt">الاستقبال</div>
        </div>
      </div>
      <div class="mbar"><i style="width:72%"></i></div>
      <div class="mcard-foot">
        <span class="done">٥ منجزة</span>
        <span class="mcard-pct ar-num">٧٢٪</span>
        <span class="rem">٢ متبقية</span>
      </div>
    </div>

    <div class="mcard">
      <div class="mcard-top">
        <div class="avatar av" style="width:46px;height:46px;font-size:19px;background:linear-gradient(150deg,#574073,#6B4E86)">م</div>
        <div>
          <div class="nm">مريم كاظم</div>
          <div class="tt">الضيافة</div>
        </div>
      </div>
      <div class="mbar"><i style="width:100%"></i></div>
      <div class="mcard-foot">
        <span class="done">٨ منجزة</span>
        <span class="mcard-pct ar-num">١٠٠٪</span>
        <span class="rem">٠ متبقية</span>
      </div>
    </div>
  </div>

</body>
</html>
