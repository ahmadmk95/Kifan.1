<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Top Bar — Kifan Design System</title>
<link rel="stylesheet" href="../assets/app.css">
<style>body{padding:0}</style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-in">
      <div class="tb-logo"><img src="../assets/logo.png" alt=""></div>
      <div class="tb-titles">
        <div class="a">لجنة النساء</div>
        <div class="b">حسينية الأمير · كيفان</div>
      </div>
      <div class="tb-right">
        <button class="tb-icon-btn" title="لوحة الحسنات">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </button>
        <button class="tb-icon-btn" title="دردشة اللجنة" style="position:relative">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="notif-badge" style="position:absolute;top:-4px;inset-inline-end:-4px;min-width:16px;height:16px;font-size:10px;padding:0 3px">٣</span>
        </button>
        <button class="tb-icon-btn tb-icon-active" title="كلمات تشجيعية" style="position:relative">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="var(--gold-deep)" stroke="var(--gold-deep)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <button class="tb-user" style="background:none;border:none;cursor:pointer;padding:0">
          <div class="tb-meta" style="text-align:start;line-height:1.2">
            <div class="nm">فاطمة الأمين</div>
            <div style="font-size:11px;color:var(--gold-soft)">خادمة الحسين</div>
          </div>
          <div class="avatar av" style="width:30px;height:30px;font-size:14px;background:linear-gradient(150deg,#6E1322,#9E1B32)">ف</div>
        </button>
        <button class="logout">خروج</button>
      </div>
    </div>
    <div class="topbar-strip"></div>
  </div>

</body>
</html>
