<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Requests — Kifan Design System</title>
<link rel="stylesheet" href="../assets/app.css">
<style>body{padding:24px}</style>
</head>
<body>

  <div class="req-card">
    <div class="avatar av" style="width:44px;height:44px;font-size:18px;background:linear-gradient(150deg,#235454,#2F6B6B)">ن</div>
    <div class="req-info">
      <div class="nm">نور جعفر</div>
      <div class="un" style="direction:ltr;text-align:right">@noor_j</div>
    </div>
    <span class="status-pill pending" style="margin-inline-start:8px">بانتظار التفعيل</span>
    <div class="req-acts">
      <select>
        <option value="">اختاري اللجنة…</option>
        <option>الاستقبال</option>
        <option>الضيافة</option>
      </select>
      <button class="btn-ok">تفعيل وإسناد</button>
      <button class="btn-reject">رفض</button>
    </div>
  </div>

</body>
</html>
