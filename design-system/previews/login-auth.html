<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Login &amp; Auth — Kifan Design System</title>
<link rel="stylesheet" href="../assets/app.css">
<style>body{padding:0}</style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-head">
        <div class="login-logo"><img src="../assets/logo.png" alt="شعار الحسينية"></div>
        <h1>لجنة النساء — متابعة المهام</h1>
        <div class="sub">حسينية الحاج عبدالله الحسين الأمير · كيفان · محرم ١٤٤٨ هـ</div>
      </div>
      <div class="login-body">
        <div class="login-dua"><span>۞</span> اللهم اجعلني عندك وجيهاً بالحسين <span>۞</span></div>
        <div class="auth-tabs" style="margin-top:18px">
          <button class="active">تسجيل الدخول</button>
          <button>طلب تسجيل</button>
        </div>
        <div class="auth-msg err">اسم المستخدم أو كلمة المرور غير صحيحة</div>
        <div class="auth-form">
          <div class="field">
            <label>اسم المستخدم</label>
            <input placeholder="username" style="direction:ltr;text-align:right">
          </div>
          <div class="field">
            <label>كلمة المرور</label>
            <input type="password" placeholder="••••" style="direction:ltr;text-align:right">
          </div>
          <button class="auth-submit">دخول</button>
        </div>
        <div class="login-hint">للتجربة — المشرفة: <b>fatima</b> · خادمة: <b>zahra</b> · كلمة المرور: <b>1234</b></div>
      </div>
    </div>
    <div class="footer-dua">رحم الله من أحيا أمرنا</div>
  </div>

</body>
</html>
