<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Chips &amp; Badges — Kifan Design System</title>
<link rel="stylesheet" href="../assets/app.css">
<style>
  body{padding:24px}
  .ds-h{font-family:var(--font-d);font-size:14px;font-weight:700;color:var(--maroon-2);margin:24px 0 10px}
  .ds-h:first-child{margin-top:0}
  .ds-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
</style>
</head>
<body>

  <div class="ds-h">وسم اللجنة (Category Tag)</div>
  <div class="ds-row">
    <span class="cat-tag" style="background:#F4EBD2;color:#BE9A3E">الاستقبال</span>
    <span class="cat-tag" style="background:#E2EFE6;color:#3F7A52">الضيافة</span>
    <span class="cat-tag" style="background:#F6E2E5;color:#9E1B32">المجلس</span>
    <span class="cat-tag" style="background:#E5EAEF;color:#4A6072">التنظيم</span>
  </div>

  <div class="ds-h">حبّة الحالة (Status Pill)</div>
  <div class="ds-row">
    <span class="status-pill pending">بانتظار التفعيل</span>
    <span class="sup-badge">★ مشرفة</span>
  </div>

  <div class="ds-h">شارات الإشعار</div>
  <div class="ds-row">
    <span class="badge-n ar-num">٢</span>
    <span class="notif-badge">٥</span>
  </div>

  <div class="ds-h">بانر تنبيه</div>
  <div class="notif-banner">🔔 لديكِ طلبان جديدان بانتظار المراجعة</div>

  <div class="ds-h">بطاقة لجنة (إدارة اللجان)</div>
  <div class="comm-card">
    <span class="comm-swatch" style="background:#3F7A52"></span>
    <div>
      <div class="nm">الضيافة</div>
      <div class="meta">٥ خادمات · ٨ مهام هذه الليلة</div>
    </div>
    <div class="acts">
      <button class="icon-btn" title="تعديل"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="icon-btn" title="حذف"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg></button>
    </div>
  </div>

</body>
</html>
